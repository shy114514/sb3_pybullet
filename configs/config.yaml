# ===================================
# Push Task RL Configuration
# ===================================

# Environment settings
env:
  max_episode_steps: 200        # Maximum steps per episode
  fixed_ee_z: 0.001               # Fixed end-effector height (m)
  step_size: 0.1                  # End-effector XY movement per action
  control_freq_inv: 24            # Physics steps per control action
  success_threshold: 0.03       # Distance threshold for success (m)
  orientation_threshold: 3.14    # Orientation threshold for success (rad, ~180 degrees)

  # Object and target dimensions (half extents)
  object_half_extents: [0.06, 0.04, 0.025]   # Object box half size (x, y, z) in meters
  target_half_extents: [0.06, 0.04, 0.001] # Target visual half size (x, y, z) in meters

  # Object spawn range
  obj_x_range: [0.35, 0.59]
  obj_y_range: [-0.43, -0.10]

  # Target spawn range
  target_x_range: [0.45, 0.75]
  target_y_range: [-0.54, 0.0]

  # Fixed EE initial position (set to avoid collision with object)
  # Object x_range starts at 0.35, so EE at x=0.15 is safely behind
  fixed_ee_initial_pos: [0.15, 0.0]  # [x, y] position for EE reset

# Reward settings
reward:
  alpha: 5.0
  w_pos: 100.0
  w_pose: 100.0
  w_align: 2.0
  gamma: 0.001
  successBonus: 100.0
  stepPenalty: -0.1
  crashPenalty: -100.0
  crashDeltaThresh: 0.1
  posThresh: 0.03
  posDeadzone: 0.06
  oriThresh: 1.0

# Training settings
training:
  # PPO hyperparameters (state mode)
  state:
    learning_rate: 0.0001
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    net_arch_pi: [256, 256, 128]
    net_arch_vf: [256, 256, 128]

  # General training settings
  default_timesteps: 1000000
  default_n_envs: 12
  progress_update_freq: 32768   # Progress bar update frequency

# Evaluation settings
evaluation:
  default_episodes: 20

  # Video settings
  video:
    enabled: false
    frame_skip: 10              # Capture every step (1 step = 0.1s physical time)
    fps: 10                     # 10 fps = 1:1 realtime (each step is 0.1s)
    width: 320
    height: 240

  # Plot settings
  plot:
    dpi: 150
    figsize: [10, 8]
